name: Google Sheets Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-code:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
  
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install requests
      
      - name: Run Sync Script
        run: python ./sync_password.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update passwords from Google Sheet"
          branch: update-passwords-bot
          title: "Mise à jour des identifiants scrapers"
          body: "Mise à jour automatique du fichier PotentialOffers.ts."
